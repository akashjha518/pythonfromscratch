<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg rounded-4 p-4" style="max-width: 500px; width: 100%;">

            <div class="text-center">
                <div class="display-1 text-success">✓</div>
                <h2 class="text-success">Registration Successful!</h2>
                <p class="text-muted">Your details have been submitted successfully.</p>
            </div>

            <hr>

            <table class="table table-bordered table-hover">
                <tbody>
                    <tr>
                        <th>Name</th>
                        <td>{{name}}</td>
                    </tr>
                    <tr>
                        <th>City</th>
                        <td>{{city}}</td>
                    </tr>
                    <tr>
                        <th>Phone</th>
                        <td>{{phonenumber}}</td>
                    </tr>
                </tbody>
            </table>

            
            <!-- <div class="mb-3">
                <span class="fw-bold">Name</span>
                <div class="form-control bg-light">{{name}}</div>
            </div>

            <div class="mb-3">
                <p class="fw-bold">City</p>
                <div class="form-control bg-light">{{city}}</div>
            </div>

            <div class="mb-4">
                <p class="fw-bold">Phone</p>
                <div class="form-control bg-light">{{phonenumber}}</div>
            </div> -->

            <div class="text-center mt-3">
                <a href="/" class="btn btn-primary">
                    Register Another User
                </a>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
